name = "cmcoutomagalhaesminas"
main = "dist/server/index.mjs"
compatibility_date = "2026-06-24"
compatibility_flags = ["nodejs_compat"]
no_bundle = true

# Static assets generated by the client build
[[assets]]
binding = "ASSETS"
directory = "dist/client"

# Routes for the registered domain (Cloudflare Workers will serve SSR here)
routes = [
  { pattern = "www.cmcoutomagalhaesminas.com.br", custom_domain = true },
  { pattern = "cmcoutomagalhaesminas.com.br", custom_domain = true }
]

# Match the Nitro-generated wrangler.json rules so Wrangler does not re-bundle
[[rules]]
type = "ESModule"
globs = ["**/*.mjs", "**/*.js"]

